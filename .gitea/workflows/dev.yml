name: Dev Build

on:
  push:
    branches: [dev]

jobs:
  build-push:
    name: Build & Push
    runs-on: [self-hosted, linux, docker]
    steps:
      - name: Checkout
        run: |
          rm -rf /repo /git-repo 2>/dev/null || true
          git clone --depth=1 --branch=dev https://github.com/trading/trading-agent.git /repo
          cd /repo && git fetch origin dev && git checkout ${{ github.sha }}

      - name: Build
        run: |
          echo "${{ secrets.NAS_REGISTRY_PASS }}" | docker login nas:5000 \
            -u "${{ secrets.NAS_REGISTRY_USER }}" --password-stdin || true
          docker buildx create --use --name multiarch 2>/dev/null || true
          docker buildx build \
            --platform linux/amd64 \
            --tag nas:5000/trading-agent:dev \
            --tag nas:5000/trading-agent:latest \
            --push \
            --file /repo/docker/Dockerfile \
            /repo
