name: CI Build & Push (dev)

on:
  push:
    branches:
      - dev

env:
  REGISTRY: nas:5000
  IMAGE_NAME: trading-agent

jobs:
  build-push:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to NAS Registry
        run: docker login nas:5000 -u ${{ secrets.NAS_REGISTRY_USER }} -p ${{ secrets.NAS_REGISTRY_PASS }}

      - name: Build and Push (dev tag)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            nas:5000/${{ env.IMAGE_NAME }}:dev
            nas:5000/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-dev:
    runs-on: self-hosted
    needs: build-push
    steps:
      - name: Deploy to DEV (Portainer stack)
        run: |
          echo "Deploying to dev stack..."
          # Restart the trading-agent container with new image
          docker pull nas:5000/trading-agent:dev
          docker stop trading-agent || true
          docker rm trading-agent || true
          docker run -d \
            --name trading-agent \
            --restart unless-stopped \
            --network portainer_agent_network \
            -v /volume1/Docker/trading-agent/vault:/app/vault \
            -v /volume1/Docker/trading-agent/data:/app/data \
            -v /volume1/Docker/trading-agent/config:/app/config \
            -v /volume1/Docker/trading-agent/knowledge:/app/knowledge \
            nas:5000/trading-agent:dev
