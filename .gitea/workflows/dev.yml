name: Dev Build

on:
  push:
    branches: [dev]

jobs:
  build-push:
    name: Build & Push
    runs-on: [self-hosted, linux, docker]
    steps:
      - name: Checkout
        run: |
          git clone --bare https://${{ secrets.GITHUB_PAT }}@github.com/${{ github.repository }}.git /git-repo
          cd /git-repo
          git fetch --depth=1 origin dev
          mkdir -p /repo
          GIT_WORK_TREE=/repo git checkout -f ${{ github.sha }}

      - name: Build
        run: |
          echo "${{ secrets.NAS_REGISTRY_PASS }}" | docker login nas:5000 \
            -u "${{ secrets.NAS_REGISTRY_USER }}" --password-stdin || true
          docker buildx create --use --name multiarch 2>/dev/null || true
          docker buildx build \
            --platform linux/amd64 \
            --tag nas:5000/trading-agent:dev \
            --tag nas:5000/trading-agent:latest \
            --push \
            --file /repo/docker/Dockerfile \
            /repo
