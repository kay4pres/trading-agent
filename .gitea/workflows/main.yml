name: CI Build & Push (main/prod)

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: nas:5000
  IMAGE_NAME: trading-agent

jobs:
  build-push:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to NAS Registry
        run: docker login nas:5000 -u ${{ secrets.NAS_REGISTRY_USER }} -p ${{ secrets.NAS_REGISTRY_PASS }}

      - name: Build and Push (main tag)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            nas:5000/${{ env.IMAGE_NAME }}:main
            nas:5000/${{ env.IMAGE_NAME }}:prod
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-prod:
    runs-on: self-hosted
    needs: build-push
    environment: production
    steps:
      - name: Deploy to PROD (manual gate)
        run: |
          echo "Deploying to PROD stack..."
          echo "PROD deployment requires manual approval"
          docker pull nas:5000/trading-agent:prod
          docker stop trading-agent || true
          docker rm trading-agent || true
          docker run -d \
            --name trading-agent \
            --restart unless-stopped \
            --network portainer_agent_network \
            -v /volume1/Docker/trading-agent/vault:/app/vault \
            -v /volume1/Docker/trading-agent/data:/app/data \
            -v /volume1/Docker/trading-agent/config:/app/config \
            -v /volume1/Docker/trading-agent/knowledge:/app/knowledge \
            nas:5000/trading-agent:prod
