name: Minimal Test

on:
  push:
    branches: [dev, main, uat]

jobs:
  test:
    name: Test
    runs-on: [self-hosted, linux, docker]
    steps:
      - name: Checkout
        run: |
          rm -rf /repo /git-repo 2>/dev/null || true
          git clone --depth=1 --branch=${{ github.ref_name }} https://github.com/${{ github.repository }}.git /repo
          cd /repo
          git fetch origin ${{ github.ref_name }}
          git checkout ${{ github.sha }}

      - name: Smoke test
        run: |
          echo "Smoke test passed" && ls /repo
