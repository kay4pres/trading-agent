name: CI — Lint, Build & Push

on:
  push:
    branches: [main, dev, uat]
  pull_request:
    branches: [main]

env:
  REGISTRY: nas:5000
  IMAGE_NAME: trading-agent

jobs:
  lint:
    name: Lint & Format Check
    runs-on: [self-hosted, linux, docker]
    steps:
      - name: Checkout
        run: |
          git clone --bare https://${{ secrets.GITHUB_PAT }}@github.com/${{ github.repository }}.git /git-repo
          cd /git-repo
          git fetch --depth=1 origin ${{ github.ref_name }}
          mkdir -p /repo
          GIT_WORK_TREE=/repo git checkout -f ${{ github.sha }}

      - name: Lint Python files
        run: |
          pip install flake8 black --break-system-packages 2>/dev/null || true
          flake8 trading_agent/ dashboard/ scripts/ \
            --max-line-length=120 \
            --ignore=E501,W503,E402 \
            --exclude=__pycache__,.git 2>/dev/null || true

      - name: Check Python syntax
        run: |
          for f in /repo/trading_agent/*.py /repo/dashboard/*.py /repo/scripts/*.py 2>/dev/null; do
            python -m py_compile "$f" 2>/dev/null && echo "OK: $f" || echo "FAIL: $f"
          done || true

  build-dev:
    name: Build & Push (dev)
    runs-on: [self-hosted, linux, docker]
    if: github.ref == 'refs/heads/dev'
    needs: []
    steps:
      - name: Checkout
        run: |
          git clone --bare https://${{ secrets.GITHUB_PAT }}@github.com/${{ github.repository }}.git /git-repo
          cd /git-repo
          git fetch --depth=1 origin dev
          mkdir -p /repo
          GIT_WORK_TREE=/repo git checkout -f ${{ github.sha }}

      - name: Log in to NAS registry
        run: |
          echo "${{ secrets.NAS_REGISTRY_PASS }}" | docker login nas:5000 \
            -u "${{ secrets.NAS_REGISTRY_USER }}" --password-stdin || true

      - name: Build and push
        run: |
          docker buildx create --use --name multiarch 2>/dev/null || docker buildx use multiarch 2>/dev/null || true
          docker buildx build \
            --platform linux/amd64 \
            --tag nas:5000/trading-agent:dev \
            --tag nas:5000/trading-agent:latest \
            --cache-from type=registry,ref=nas:5000/trading-agent:dev \
            --cache-to type=registry,ref=nas:5000/trading-agent:dev \
            --build-arg GIT_REF=dev \
            --build-arg CACHEBUST=${{ github.sha }} \
            --push \
            --file /repo/docker/Dockerfile \
            /repo

  build-main:
    name: Build & Push (main)
    runs-on: [self-hosted, linux, docker]
    if: github.ref == 'refs/heads/main'
    needs: []
    steps:
      - name: Checkout
        run: |
          git clone --bare https://${{ secrets.GITHUB_PAT }}@github.com/${{ github.repository }}.git /git-repo
          cd /git-repo
          git fetch --depth=1 origin main
          mkdir -p /repo
          GIT_WORK_TREE=/repo git checkout -f ${{ github.sha }}

      - name: Log in to NAS registry
        run: |
          echo "${{ secrets.NAS_REGISTRY_PASS }}" | docker login nas:5000 \
            -u "${{ secrets.NAS_REGISTRY_USER }}" --password-stdin || true

      - name: Build and push
        run: |
          docker buildx create --use --name multiarch 2>/dev/null || docker buildx use multiarch 2>/dev/null || true
          docker buildx build \
            --platform linux/amd64 \
            --tag nas:5000/trading-agent:main \
            --tag nas:5000/trading-agent:latest \
            --cache-from type=registry,ref=nas:5000/trading-agent:main \
            --cache-to type=registry,ref=nas:5000/trading-agent:main \
            --build-arg GIT_REF=main \
            --build-arg CACHEBUST=${{ github.sha }} \
            --push \
            --file /repo/docker/Dockerfile \
            /repo

  build-uat:
    name: Build & Push (uat)
    runs-on: [self-hosted, linux, docker]
    if: github.ref == 'refs/heads/uat'
    needs: []
    steps:
      - name: Checkout
        run: |
          git clone --bare https://${{ secrets.GITHUB_PAT }}@github.com/${{ github.repository }}.git /git-repo
          cd /git-repo
          git fetch --depth=1 origin uat
          mkdir -p /repo
          GIT_WORK_TREE=/repo git checkout -f ${{ github.sha }}

      - name: Log in to NAS registry
        run: |
          echo "${{ secrets.NAS_REGISTRY_PASS }}" | docker login nas:5000 \
            -u "${{ secrets.NAS_REGISTRY_USER }}" --password-stdin || true

      - name: Build and push
        run: |
          docker buildx create --use --name multiarch 2>/dev/null || docker buildx use multiarch 2>/dev/null || true
          docker buildx build \
            --platform linux/amd64 \
            --tag nas:5000/trading-agent:uat \
            --cache-from type=registry,ref=nas:5000/trading-agent:uat \
            --cache-to type=registry,ref=nas:5000/trading-agent:uat \
            --build-arg GIT_REF=uat \
            --build-arg CACHEBUST=${{ github.sha }} \
            --push \
            --file /repo/docker/Dockerfile \
            /repo
