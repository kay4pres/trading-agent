name: CI — Lint, Build & Push

on:
  push:
    branches: [main, dev, uat]
  pull_request:
    branches: [main]

env:
  REGISTRY: nas:5000
  IMAGE_NAME: trading-agent

jobs:
  # ── Job 1: Lint & Type Check ─────────────────────────────────────────────────
  lint:
    name: Lint & Format Check
    runs-on: [self-hosted, linux, docker]
    steps:
      # Native git checkout — no Node.js required
      - name: Checkout
        run: |
          git clone --depth=1 --branch=${{ github.ref_name }} https://x-access-token:${{ secrets.GITHUB_PAT }}@github.com/${{ github.repository }}.git /repo
          cd /repo
          git checkout ${{ github.sha }}

      - name: Set up Python
        run: pip install flake8 black --break-system-packages

      - name: Run flake8
        run: |
          pip install flake8 black --break-system-packages || true
          flake8 trading_agent/ dashboard/ scripts/ \
            --max-line-length=120 \
            --ignore=E501,W503,E402 \
            --exclude=__pycache__,.git || true
        continue-on-error: true

      - name: Check Python syntax
        run: python -m py_compile trading_agent/*.py dashboard/*.py scripts/*.py || true

  # ── Job 2: Docker Build & Push (dev branch) ─────────────────────────────────
  build-dev:
    name: Build & Push (dev → nas:5000)
    runs-on: [self-hosted, linux, docker]
    if: github.ref == 'refs/heads/dev'
    steps:
      - name: Checkout
        run: |
          git clone --depth=1 --branch=dev https://x-access-token:${{ secrets.GITHUB_PAT }}@github.com/${{ github.repository }}.git /repo
          cd /repo
          git fetch origin dev
          git checkout ${{ github.sha }}

      - name: Log in to NAS registry
        run: |
          echo "${{ secrets.NAS_REGISTRY_PASS }}" | docker login nas:5000 \
            -u "${{ secrets.NAS_REGISTRY_USER }}" --password-stdin

      - name: Set up Docker Buildx
        run: docker buildx create --use --name multiarch || docker buildx use multiarch || true

      - name: Build and push (dev tag)
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --tag nas:5000/trading-agent:dev \
            --tag nas:5000/trading-agent:latest \
            --cache-from type=registry,ref=nas:5000/trading-agent:dev \
            --cache-to type=registry,ref=nas:5000/trading-agent:dev \
            --build-arg GIT_REF=dev \
            --build-arg CACHEBUST=${{ github.sha }} \
            --push \
            --file docker/Dockerfile \
            /repo

  # ── Job 3: Docker Build & Push (main branch) ─────────────────────────────────
  build-main:
    name: Build & Push (main → nas:5000)
    runs-on: [self-hosted, linux, docker]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        run: |
          git clone --depth=1 --branch=main https://x-access-token:${{ secrets.GITHUB_PAT }}@github.com/${{ github.repository }}.git /repo
          cd /repo
          git fetch origin main
          git checkout ${{ github.sha }}

      - name: Log in to NAS registry
        run: |
          echo "${{ secrets.NAS_REGISTRY_PASS }}" | docker login nas:5000 \
            -u "${{ secrets.NAS_REGISTRY_USER }}" --password-stdin

      - name: Set up Docker Buildx
        run: docker buildx create --use --name multiarch || docker buildx use multiarch || true

      - name: Extract date for image tag
        id: date
        run: echo "DATE=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Build and push (main tag)
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --tag nas:5000/trading-agent:main \
            --tag nas:5000/trading-agent:${{ steps.date.outputs.DATE }} \
            --tag nas:5000/trading-agent:latest \
            --cache-from type=registry,ref=nas:5000/trading-agent:main \
            --cache-to type=registry,ref=nas:5000/trading-agent:main \
            --build-arg GIT_REF=main \
            --build-arg CACHEBUST=${{ github.sha }} \
            --push \
            --file docker/Dockerfile \
            /repo

  # ── Job 4: Docker Build & Push (uat branch) ──────────────────────────────────
  build-uat:
    name: Build & Push (uat → nas:5000)
    runs-on: [self-hosted, linux, docker]
    if: github.ref == 'refs/heads/uat'
    steps:
      - name: Checkout
        run: |
          git clone --depth=1 --branch=uat https://x-access-token:${{ secrets.GITHUB_PAT }}@github.com/${{ github.repository }}.git /repo
          cd /repo
          git fetch origin uat
          git checkout ${{ github.sha }}

      - name: Log in to NAS registry
        run: |
          echo "${{ secrets.NAS_REGISTRY_PASS }}" | docker login nas:5000 \
            -u "${{ secrets.NAS_REGISTRY_USER }}" --password-stdin

      - name: Set up Docker Buildx
        run: docker buildx create --use --name multiarch || docker buildx use multiarch || true

      - name: Build and push (uat tag)
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --tag nas:5000/trading-agent:uat \
            --cache-from type=registry,ref=nas:5000/trading-agent:uat \
            --cache-to type=registry,ref=nas:5000/trading-agent:uat \
            --build-arg GIT_REF=uat \
            --build-arg CACHEBUST=${{ github.sha }} \
            --push \
            --file docker/Dockerfile \
            /repo
