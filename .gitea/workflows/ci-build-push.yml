name: CI — Lint, Build & Push

on:
  push:
    branches: [main, dev, 'pipeline-builder/**', 'dev-rollout']
  pull_request:
    branches: [main]

env:
  REGISTRY: nas:5000
  IMAGE_NAME: trading-agent
  GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}

jobs:
  # ── Job 1: Lint & Type Check ─────────────────────────────────────────────────
  lint:
    name: Lint & Format Check
    runs-on: [self-hosted, linux]
    container: python:3.12-slim
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        run: pip install flake8 black --break-system-packages

      - name: Run flake8
        run: |
          flake8 trading_agent/ dashboard/ scripts/ \
            --max-line-length=120 \
            --ignore=E501,W503,E402 \
            --exclude=__pycache__,.git || true
        continue-on-error: true

      - name: Check Python syntax
        run: python -m py_compile trading_agent/*.py dashboard/*.py scripts/*.py

      - name: Check for hardcoded E:\\ paths in Docker files
        run: |
          grep -rn 'E:\\\\|r"E:\\'|E:/' trading_agent/ dashboard/ scripts/ \
            --include="*.py" || echo "No hardcoded Windows paths found"

  # ── Job 2: Docker Build & Push (dev branch) ─────────────────────────────────
  build-dev:
    name: Build & Push (dev → nas:5000)
    runs-on: [self-hosted, linux, docker]
    if: github.ref == 'refs/heads/dev'
    container: docker:24-dind
    options: --privileged
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to NAS registry
        run: |
          echo "${{ secrets.NAS_REGISTRY_PASS }}" | docker login nas:5000 \
            -u "${{ secrets.NAS_REGISTRY_USER }}" --password-stdin

      - name: Set up Docker Buildx
        run: |
          docker buildx create --use --name multiarch || docker buildx use multiarch

      - name: Extract date for image tag
        id: date
        run: echo "DATE=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Build and push (dev tag)
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --tag nas:5000/trading-agent:dev \
            --tag nas:5000/trading-agent:dev-${{ steps.date.outputs.DATE }} \
            --tag nas:5000/trading-agent:latest \
            --cache-from type=registry,ref=nas:5000/trading-agent:dev \
            --cache-to type=registry,ref=nas:5000/trading-agent:dev \
            --build-arg GIT_REF=dev \
            --build-arg GITEA_TOKEN=${{ env.GITEA_TOKEN }} \
            --push \
            --file docker/Dockerfile \
            .

  # ── Job 3: Docker Build & Push (main branch) ───────────────────────────────
  build-main:
    name: Build & Push (main → nas:5000)
    runs-on: [self-hosted, linux, docker]
    if: github.ref == 'refs/heads/main'
    container: docker:24-dind
    options: --privileged
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to NAS registry
        run: |
          echo "${{ secrets.NAS_REGISTRY_PASS }}" | docker login nas:5000 \
            -u "${{ secrets.NAS_REGISTRY_USER }}" --password-stdin

      - name: Set up Docker Buildx
        run: |
          docker buildx create --use --name multiarch || docker buildx use multiarch

      - name: Extract date for image tag
        id: date
        run: echo "DATE=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Build and push (main tag)
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --tag nas:5000/trading-agent:main \
            --tag nas:5000/trading-agent:${{ steps.date.outputs.DATE }} \
            --tag nas:5000/trading-agent:latest \
            --cache-from type=registry,ref=nas:5000/trading-agent:main \
            --cache-to type=registry,ref=nas:5000/trading-agent:main \
            --build-arg GIT_REF=main \
            --build-arg GITEA_TOKEN=${{ env.GITEA_TOKEN }} \
            --push \
            --file docker/Dockerfile \
            .
