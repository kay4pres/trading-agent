# Portainer stack — trading-agent-dev
#
# This file is the corrected version that matches the actual NAS pattern
# (the earlier docker-compose.dev.yml used /data/compose/2/vault which does
# not exist on the NAS — the real path is /volume1/Docker/trading-agent-dev/).
#
# Build the image first (see tools/DAY-4-PHASE-A-DEPLOY-HANDOFF.md for the
# full step-by-step). Then deploy via:
#   Portainer → Stacks → Add stack → Upload → paste this file → Deploy.
#
# What this deploys:
#   - container_name: trading-agent-dev
#   - image: nas:5000/trading-agent:latest (shared tag, picked up at deploy time)
#   - host port: 5060 → container port 5060 (DASHBOARD_PORT=5060)
#   - volumes: /volume1/Docker/trading-agent-dev/{vault,dashboard/static,...}
#   - network: trading-agent_default (shared with UAT)
#   - resources: 2G memory cap
#   - env: ENV_NAME=DEV, TRADER_FORCE_PAPER=1
#
# Required env vars (set in Portainer UI when deploying):
#   - ALPACA_API_KEY       (Dev paper-trading key — set in Portainer, not hardcoded)
#   - ALPACA_SECRET_KEY    (Dev paper-trading secret)
#   - MINIMAX_API_KEY     (Dev LLM key)
#   - TV_WEBHOOK_SECRET    (optional)

services:
  trading-agent:
    image: nas:5000/trading-agent:latest
    container_name: trading-agent-dev
    restart: unless-stopped

    environment:
      - TZ=Europe/Berlin
      - ENV_NAME=DEV
      - TRADER_FORCE_PAPER=1
      - DASHBOARD_PORT=5060
      - TRADING_DATA_DIR=/app/data
      - ALPACA_API_KEY=${ALPACA_API_KEY}
      - ALPACA_SECRET_KEY=${ALPACA_SECRET_KEY}
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
      - TV_WEBHOOK_SECRET=${TV_WEBHOOK_SECRET:-}
      # IBGW relay: use the NAS host IP directly. host.docker.internal
      # does NOT resolve on this Docker setup (verified via fact-check 2026-07-22).
      # The relay runs as a host process on 10.8.0.10:5000.
      - IBGW_RELAY_URL=http://10.8.0.10:5000/order

    volumes:
      - /volume1/Docker/trading-agent-dev/vault:/app/vault:rw
      # CRITICAL: separate data dir from UAT. /volume1/Docker/data is a
      # single shared directory — if Dev mounted it too, paper trades would
      # overwrite UAT's positions.json, trade_journal.csv, etc.
      - /volume1/Docker/data-dev:/app/data
      - /volume1/Docker/trading-agent-dev/dashboard/static:/app/dashboard/static:ro
      - /volume1/Docker/trading-agent-dev/models:/app/models:ro
      - /volume1/Docker/trading-agent-dev/knowledge:/app/knowledge:ro
      - /volume1/Docker/trading-agent-dev/config:/app/config:ro

    ports:
      - "5060:5060"

    healthcheck:
      # Use the /api/state endpoint (matches UAT pattern, exercises the
      # actual dashboard API rather than just static HTML).
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5060/api/state')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "7"

    networks:
      - trading-agent_default

networks:
  trading-agent_default:
    external: true
