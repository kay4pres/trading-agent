# docker-compose.dev.yml — Trading Agent (Dev environment)
#
# Mirror of portainer-stack-dev.yml for `docker compose` CLI use.
# Pattern matches the UAT compose at /volume1/Docker/trading-agent-uat/
# (read it with: ssh nas 'cat /volume1/Docker/trading-agent-uat/docker-compose.yml').
#
# Build the image first (see tools/DAY-4-PHASE-A-DEPLOY-HANDOFF.md):
#   1. Extract source from gitea at the target commit (use git archive
#      inside the gitea container — pattern documented in
#      C:\Users\Kay\AppData\Local\hermes\skills\operations\trading-agent-ops\
#      references\nas-docker-build-from-gitea-jul14.md)
#   2. Build the image:
#      docker build -t nas:5000/trading-agent:latest -f /tmp/dev-build/docker/Dockerfile /tmp/dev-build
#   3. Push: docker push nas:5000/trading-agent:latest
#
# Deploy (after image is on the NAS):
#   docker compose -f /volume1/Docker/trading-agent-dev/docker-compose.yml up -d

services:
  trading-agent:
    image: nas:5000/trading-agent:latest
    container_name: trading-agent-dev
    restart: unless-stopped

    environment:
      - TZ=Europe/Berlin
      - ENV_NAME=DEV
      - TRADER_FORCE_PAPER=1
      - DASHBOARD_PORT=5060
      - TRADING_DATA_DIR=/app/data
      - ALPACA_API_KEY=${ALPACA_API_KEY}
      - ALPACA_SECRET_KEY=${ALPACA_SECRET_KEY}
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
      - TV_WEBHOOK_SECRET=${TV_WEBHOOK_SECRET:-}
      - IBGW_RELAY_URL=http://host.docker.internal:5000/order

    volumes:
      - /volume1/Docker/trading-agent-dev/vault:/app/vault:rw
      - /volume1/Docker/data:/app/data
      - /volume1/Docker/trading-agent-dev/dashboard/static:/app/dashboard/static:ro
      - /volume1/Docker/trading-agent-dev/models:/app/models:ro
      - /volume1/Docker/trading-agent-dev/knowledge:/app/knowledge:ro
      - /volume1/Docker/trading-agent-dev/config:/app/config:ro

    ports:
      - "5060:5060"

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5060/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "7"

    networks:
      - trading-agent_default

networks:
  trading-agent_default:
    external: true
