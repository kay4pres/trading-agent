# docker-compose.yml — Kay's Trading Agent Stack
# Deploy via Portainer: paste this + fill in secrets
#
# Portainer setup:
#   Stacks → Add stack → paste docker-compose.yml
#   CRITICAL: secrets must be added via Portainer → Docker → Secrets
#   BEFORE adding the stack, create these secrets in Portainer:
#     Name: trading_agent_alpaca_api_key    | Value: <your Alpaca API key>
#     Name: trading_agent_alpaca_secret    | Value: <your Alpaca secret key>
#     Name: trading_agent_telegram_token    | Value: <your Telegram bot token>
#     Name: trading_agent_minimax_key      | Value: <your MiniMax API key>
#   Then in the stack editor, reference: ${TRADING_AGENT_ALPACA_API_KEY}
#   (Portainer passes secrets as env vars — still encrypted, never in git)
#
# Local dev:
#   cp .env.example .env
#   docker compose up -d

services:
  trading-agent:
    image: nas:5000/trading-agent:latest
    container_name: trading-agent
    restart: unless-stopped

    # Environment variables — set in Portainer stack config
    # (NEVER commit real values to git)
    environment:
      - TZ=Europe/Berlin

      # ── Alpaca ──────────────────────────────────────────────────────────────
      # Paper trading API keys from https://app.alpaca.markets/
      - ALPACA_API_KEY=${ALPACA_API_KEY}
      - ALPACA_SECRET_KEY=${ALPACA_SECRET_KEY}

      # ── Telegram ───────────────────────────────────────────────────────────
      # Bot token from @BotFather
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}

      # ── LLM ─────────────────────────────────────────────────────────────────
      # MiniMax API key for Bull/Bear debate
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}

      # ── Optional ────────────────────────────────────────────────────────────
      # TradingView webhook secret (verify incoming alerts)
      - TV_WEBHOOK_SECRET=${TV_WEBHOOK_SECRET:-}

    # Persist state across restarts — maps host folder to container vault
    volumes:
      # Vault: encrypted credentials (host only, gitignored)
      - ./vault:/app/vault:ro

      # Data: positions, signals, logs, watchlists
      - ./data:/app/data

      # Dashboard static files
      - ./dashboard/static:/app/dashboard/static:ro

      # Local models (Whisper) if present
      - ./models:/app/models:ro

      # Knowledge base: raw course videos + transcripts (for cron transcription)
      - ./knowledge:/app/knowledge:ro

      # Config: TradingView session cookie (for TV Premium API inside container)
      # Also expose fincept/finnhub/alphavantage keys if needed
      - ./config:/app/config:ro

    ports:
      - "5050:5050"   # Dashboard

    # Health check — dashboard must respond
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5050/api/state')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

    # Resource limits (NAS-friendly)
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

    # Logging — rotate daily, keep 7 days
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "7"
